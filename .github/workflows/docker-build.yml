name: Build and Push Docker image

on:
  push:
    branches: [ "dev" ]
  release:
    types: [ created ]

jobs:
  build-and-push-dev:
    if: github.ref == 'refs/heads/dev'
    uses: pogof/actions/.github/workflows/build-push-dev.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image_name: simplylove-discordleaderboard
      dockerfile: ./Dockerfile
      context: .

  update-dev-deploy:
    if: github.ref == 'refs/heads/dev'
    needs: build-and-push-dev
    uses: pogof/actions/.github/workflows/update-compose-and-webhook.yml@main
    with:
      compose_repository: pogof/docker-compose-repo
      compose_path: leaderbot-dev.yaml
      image_repo: ghcr.io/${{ github.repository_owner }}/simplylove-discordleaderboard
      image_tag: dev-${{ needs.build-and-push-dev.outputs.short_sha }}
      webhook_enabled: true
      webhook_url: https://dh.pogof.cz/api/git/stacks/4/webhook
    secrets:
      deploy_repo_token: ${{ secrets.DEPLOY_REPO_TOKEN }}
      webhook_secret: ${{ secrets.DOCKHAND_WEBHOOK_SECRET }}

  build-and-push-release:
    if: github.event_name == 'release'
    uses: pogof/actions/.github/workflows/build-push-release.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image_name: simplylove-discordleaderboard
      dockerfile: ./Dockerfile
      context: .
      tag_name: ${{ github.event.release.tag_name }}
      push_latest: true

  build-and-push-release-dockerhub:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/simplylove-discordleaderboard:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKER_USERNAME }}/simplylove-discordleaderboard:latest