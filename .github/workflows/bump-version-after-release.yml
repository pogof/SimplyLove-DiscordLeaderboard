name: Bump Version After Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish || github.event.repository.default_branch }}

      - name: Bump minor version in utility/version.py
        id: bump
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version_file = Path("utility/version.py")
          content = version_file.read_text(encoding="utf-8")

          match = re.search(r'APP_VERSION\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not match:
            raise SystemExit("Could not find APP_VERSION in utility/version.py")

          major, minor, patch = map(int, match.groups())
          old_version = f"{major}.{minor}.{patch}"
          new_version = f"{major}.{minor + 1}.0"

          updated = re.sub(
            r'APP_VERSION\s*=\s*"\d+\.\d+\.\d+"',
            f'APP_VERSION = "{new_version}"',
            content,
            count=1,
          )

          version_file.write_text(updated, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"old_version={old_version}\n")
            out.write(f"new_version={new_version}\n")
          PY

      - name: Commit and push version bump
        env:
          BRANCH_NAME: ${{ github.event.release.target_commitish || github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- utility/version.py; then
            echo "No version changes to commit."
            exit 0
          fi

          git add utility/version.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin "${BRANCH_NAME}"
